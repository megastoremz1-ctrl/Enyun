<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="duckBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </radialGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="50" ry="45" fill="url(#duckBody)" stroke="#ccc" stroke-width="1"/>
  <!-- Head -->
  <circle cx="100" cy="72" r="30" fill="url(#duckBody)" stroke="#ccc" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="88" cy="66" r="5" fill="#333"/>
  <circle cx="112" cy="66" r="5" fill="#333"/>
  <circle cx="90" cy="64" r="2" fill="#fff"/>
  <circle cx="114" cy="64" r="2" fill="#fff"/>
  <!-- Bill -->
  <ellipse cx="100" cy="84" rx="16" ry="8" fill="#ff9800"/>
  <line x1="84" y1="84" x2="116" y2="84" stroke="#e65100" stroke-width="1"/>
  <!-- Wings -->
  <ellipse cx="55" cy="125" rx="20" ry="28" fill="#f0f0f0" stroke="#ccc" stroke-width="1" transform="rotate(-10 55 125)"/>
  <ellipse cx="145" cy="125" rx="20" ry="28" fill="#f0f0f0" stroke="#ccc" stroke-width="1" transform="rotate(10 145 125)"/>
  <!-- Feet -->
  <ellipse cx="82" cy="178" rx="12" ry="6" fill="#ff9800"/>
  <ellipse cx="118" cy="178" rx="12" ry="6" fill="#ff9800"/>
  <!-- Tail -->
  <path d="M140 150 Q160 140 155 130 Q165 135 160 145" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
</svg>
