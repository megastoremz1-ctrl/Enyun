<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="horn" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="unicornMane" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="33%" style="stop-color:#c44dff"/>
      <stop offset="66%" style="stop-color:#4db8ff"/>
      <stop offset="100%" style="stop-color:#6bcf7f"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="50" ry="40" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Legs -->
  <rect x="72" y="160" width="10" height="28" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="92" y="162" width="10" height="28" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="108" y="162" width="10" height="28" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="122" y="160" width="10" height="28" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <!-- Head -->
  <ellipse cx="100" cy="72" rx="28" ry="32" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Horn -->
  <polygon points="100,15 93,48 107,48" fill="url(#horn)" stroke="#e6b800" stroke-width="1"/>
  <line x1="95" y1="25" x2="105" y2="30" stroke="#e6b800" stroke-width="1"/>
  <line x1="96" y1="32" x2="104" y2="37" stroke="#e6b800" stroke-width="1"/>
  <line x1="97" y1="39" x2="103" y2="44" stroke="#e6b800" stroke-width="1"/>
  <!-- Mane -->
  <path d="M80 50 Q65 60 70 80 Q60 90 65 100 Q55 105 62 115" fill="none" stroke="url(#unicornMane)" stroke-width="8" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="90" cy="68" r="5" fill="#333"/>
  <circle cx="110" cy="68" r="5" fill="#333"/>
  <circle cx="91" cy="66" r="2" fill="#fff"/>
  <circle cx="111" cy="66" r="2" fill="#fff"/>
  <!-- Nostril -->
  <circle cx="96" cy="82" r="2" fill="#ffd0d0"/>
  <circle cx="104" cy="82" r="2" fill="#ffd0d0"/>
  <!-- Tail -->
  <path d="M150 130 Q170 120 165 105 Q175 115 168 125 Q180 120 172 132" fill="none" stroke="url(#unicornMane)" stroke-width="6" stroke-linecap="round"/>
  <!-- Sparkles -->
  <text x="55" y="55" font-size="14" fill="#ffd700">✦</text>
  <text x="140" y="50" font-size="10" fill="#c44dff">✦</text>
  <text x="155" y="100" font-size="12" fill="#ff6b9d">✦</text>
</svg>
