<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="mane" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#cc5500"/>
    </radialGradient>
    <radialGradient id="lionFace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#ffb300"/>
    </radialGradient>
  </defs>
  <!-- Mane -->
  <circle cx="100" cy="80" r="50" fill="url(#mane)"/>
  <!-- Spiky mane edges -->
  <circle cx="60" cy="60" r="12" fill="#cc5500"/>
  <circle cx="80" cy="40" r="14" fill="#cc5500"/>
  <circle cx="105" cy="35" r="13" fill="#cc5500"/>
  <circle cx="130" cy="42" r="12" fill="#cc5500"/>
  <circle cx="145" cy="60" r="11" fill="#cc5500"/>
  <circle cx="150" cy="82" r="12" fill="#cc5500"/>
  <circle cx="145" cy="105" r="11" fill="#cc5500"/>
  <circle cx="55" cy="80" r="11" fill="#cc5500"/>
  <circle cx="55" cy="100" r="10" fill="#cc5500"/>
  <!-- Face -->
  <circle cx="100" cy="82" r="35" fill="url(#lionFace)"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="75" rx="5" ry="6" fill="#333"/>
  <ellipse cx="114" cy="75" rx="5" ry="6" fill="#333"/>
  <circle cx="87" cy="73" r="2" fill="#fff"/>
  <circle cx="115" cy="73" r="2" fill="#fff"/>
  <!-- Nose -->
  <path d="M95 88 Q100 93 105 88 Q100 95 95 88" fill="#333"/>
  <!-- Mouth -->
  <path d="M93 95 Q100 100 107 95" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="100" cy="150" rx="40" ry="35" fill="#ffb300"/>
  <!-- Paws -->
  <ellipse cx="75" cy="180" rx="12" ry="8" fill="#ffd54f"/>
  <ellipse cx="125" cy="180" rx="12" ry="8" fill="#ffd54f"/>
  <!-- Tail -->
  <path d="M140 150 Q165 140 160 120" fill="none" stroke="#ffb300" stroke-width="5" stroke-linecap="round"/>
  <circle cx="160" cy="118" r="8" fill="#cc5500"/>
</svg>
